name: Update contributors

on:
  push:
    branches:
      - main
  schedule:
    # Weekly safety net in case a push doesn't trigger (e.g. release tag pushes only).
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-contributors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Update contributors list in README
        uses: akhilmhdh/contributors-readme-action@83ea0b4f1ac928fbfe88b9e8460a932a528eb79f
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          readme_path: README.md
          image_size: 80
          columns_per_row: 6
          use_username: true
          commit_message: 'docs: update contributors list'
