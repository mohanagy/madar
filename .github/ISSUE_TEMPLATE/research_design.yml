# .github/ISSUE_TEMPLATE/research_design.yml
# Research/Design issue template
name: Research / Design
about: Propose or discuss research, design, or architectural changes
title: "[Research] <short description>"
labels: [research, design]
assignees: ''

body:
- type: markdown
  attributes:
    value: |
      ## Research / Design Proposal

- type: input
  id: summary
  attributes:
    label: Summary
    description: Brief one-line summary of the research or design.
    placeholder: e.g., Evaluate new caching strategy for query layer
  validations:
    required: true

- type: textarea
  id: motivation
  attributes:
    label: Motivation
    description: Why is this research needed? What problem does it solve?
    placeholder: Provide context and rationale...
  validations:
    required: true

- type: textarea
  id: approach
  attributes:
    label: Proposed Approach
    description: Outline the research methodology or design direction.
    placeholder: Steps, hypotheses, alternatives...
  validations:
    required: false

- type: textarea
  id: expected_outcome
  attributes:
    label: Expected Outcome
    description: What deliverables or decisions should result from this?
    placeholder: e.g., A design document, decision on approach, benchmark results
  validations:
    required: false

- type: dropdown
  id: priority
  attributes:
    label: Priority
    options:
      - Low
      - Medium
      - High
      - Critical
    default: 0
  validations:
    required: true

- type: checkboxes
  id: definition_of_done
  attributes:
    label: Definition of Done
    description: Check all that apply before closing.
    options:
      - label: Research completed and documented
      - label: Design review conducted
      - label: Decision recorded in ADR or similar
      - label: Open questions resolved or noted