# ---------------------------------------------------------------------------
# README / CHANGELOG update helpers
# ---------------------------------------------------------------------------
def update_readme_with_roadmap(
    output_root: Path, roadmap_url: str, overwrite: bool
) -> None:
    """
    Append a roadmap link section to README.md if it does not already contain one.

    Args:
        output_root: Root directory for the project.
        roadmap_url: URL of the roadmap.
        overwrite: Whether to overwrite (currently unused; always appends if missing).
    """
    readme_path: Path = output_root / _README_FILE
    if not readme_path.exists():
        log.warning("%s not found, cannot update with roadmap link.", _README_FILE)
        return

    content: str = readme_path.read_text(encoding="utf-8")
    if "roadmap" in content.lower() and "github.com" in content:
        log.info("README.md already has roadmap link – skipping.")
        return

    log.info("Appending roadmap link to README.md")
    with readme_path.open("a", encoding="utf-8") as f:
        f.write(f"\n\n## Roadmap\n\nCheck our roadmap for upcoming features:\n{roadmap_url}\n")


def update_changelog_with_roadmap(
    output_root: Path, roadmap_url: str, overwrite: bool
) -> None:
    """
    Append a roadmap link section to CHANGELOG.md if it does not already contain one.

    Args:
        output_root: Root directory for the project.
        roadmap_url: URL of the roadmap.
        overwrite: Whether to overwrite (currently unused; always appends if missing).
    """
    changelog_path: Path = output_root / _CHANGELOG_FILE
    if not changelog_path.exists():
        log.warning("%s not found, cannot update with roadmap link.", _CHANGELOG_FILE)
        return

    content: str = changelog_path.read_text(encoding="utf-8")
    if "roadmap" in content.lower() and "github.com" in content:
        log.info("CHANGELOG.md already has roadmap link – skipping.")
        return

    log.info("Appending roadmap link to CHANGELOG.md")
    with changelog_path.open("a", encoding="utf-8") as f:
        f.write(f"\n\n## Roadmap\n\nView our roadmap:\n{roadmap_url}\n")


# ---------------------------------------------------------------------------
# Argument parsing and main orchestration
# ---------------------------------------------------------------------------
def parse_arguments() -> argparse.Namespace:
    """
    Parse command line arguments.

    Returns:
        Parsed namespace with attributes: overwrite, roadmap_url, output_dir,
        update_readme, update_changelog.
    """
    parser = argparse.ArgumentParser(
        description="Generate GitHub contributing docs and issue templates."
    )
    parser.add_argument(
        "--overwrite",
        action="store_true",
        help="Overwrite existing files (default: skip existing).",
    )
    parser.add_argument(
        "--roadmap-url",
        type=str,
        default=_DEFAULT_ROADMAP_URL,
        help=f"URL of the project roadmap (default: {_DEFAULT_ROADMAP_URL})",
    )
    parser.add_argument(
        "--output-dir",
        type=str,
        default=_DEFAULT_OUTPUT_DIR,
        help=f"Base output directory (default: {_DEFAULT_OUTPUT_DIR})",
    )
    parser.add_argument(
        "--update-readme",
        action="store_true",
        help="Append roadmap link to README.md if not already present.",
    )
    parser.add_argument(
        "--update-changelog",
        action="store_true",
        help="Append roadmap link to CHANGELOG.md if not already present.",
    )
    return parser.parse_args()


def main() -> None:
    """
    Main entry point. Validates inputs, generates all templates, and writes files.
    """
    args: argparse.Namespace = parse_arguments()

    # Validate roadmap URL
    try:
        roadmap_url: str = validate_roadmap_url(args.roadmap_url)
    except InvalidUrlError as exc:
        log.error("Invalid roadmap URL: %s", exc)
        sys.exit(1)

    # Validate output directory
    output_dir: Path = Path(args.output_dir)
    try:
        output_dir = validate_output_dir(output_dir)
    except FileOperationError as exc:
        log.error("Output directory validation failed: %s", exc)
        sys.exit(1)

    overwrite: bool = args.overwrite

    # Define files to write
    files_to_write: List[Tuple[Path, str]] = []

    # CONTRIBUTING.md
    contributing_content: str = make_contributing(roadmap_url)
    contributing_path: Path = output_dir / _CONTRIBUTING_FILE
    files_to_write.append((contributing_path, contributing_content))

    # PR template
    pr_content: str = make_pull_request_template()
    pr_path: Path = output_dir / _PR_TEMPLATE_FILE
    files_to_write.append((pr_path, pr_content))

    # Issue templates
    issue_dir: Path = output_dir / _ISSUE_TEMPLATE_DIR
    issue_contents: Dict[str, str] = {
        "bug_report.md": make_bug_report(),
        "feature_request.md": make_feature_request(),
        "benchmark.md": make_benchmark(),
        "docs_request.md": make_docs_request(),
        "research_design.md": make_research_design(),
    }
    for name, content in issue_contents.items():
        files_to_write.append((issue_dir / name, content))

    # Write all files with error handling
    for file_path, content in files_to_write:
        try:
            write_file(file_path, content, output_dir, overwrite)
        except (PathTraversalError, PermissionError, OSError, ValueError) as exc:
            log.error("Failed to write %s: %s", file_path, exc)
            sys.exit(1)

    # Optionally update README and CHANGELOG
    if args.update_readme:
        try:
            update_readme_with_roadmap(output_dir, roadmap_url, overwrite)
        except Exception as exc:
            log.error("Failed to update README.md: %s", exc)
            sys.exit(1)

    if args.update_changelog:
        try:
            update_changelog_with_roadmap(output_dir, roadmap_url, overwrite)
        except Exception as exc:
            log.error("Failed to update CHANGELOG.md: %s", exc)
            sys.exit(1)

    log.info("Documentation generation completed successfully.")


if __name__ == "__main__":
    main()
