#!/usr/bin/env python3
"""
Generate GitHub contributing docs and issue templates for a software repository.
Creates CONTRIBUTING.md, pull request template, issue templates (YAML front matter
in .md), and optionally updates README.md / CHANGELOG.md with roadmap links.

Usage:
    python generate_docs.py [--overwrite] [--roadmap-url URL] [--output-dir DIR]
                            [--update-readme] [--update-changelog]

Environment variables:
    ROADMAP_URL    Override default roadmap URL
    OUTPUT_DIR     Override base output directory (default .)
"""

import argparse
import logging
import os
import re
import sys
from pathlib import Path
from typing import Dict, Final, List, Optional, Tuple

# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
logging.basicConfig(
    level=logging.INFO,
    format="%(asctime)s - %(name)s - %(levelname)s - %(message)s",
    datefmt="%Y-%m-%d %H:%M:%S",
)
log: logging.Logger = logging.getLogger(__name__)

# ---------------------------------------------------------------------------
# Constants (with environment override)
# ---------------------------------------------------------------------------
_DEFAULT_ROADMAP_URL: Final[str] = os.getenv(
    "ROADMAP_URL",
    "https://github.com/owner/repo/issues/1",  # placeholder – update per project
)
_DEFAULT_OUTPUT_DIR: Final[str] = os.getenv("OUTPUT_DIR", ".")
_ISSUE_TEMPLATE_DIR: Final[str] = ".github/ISSUE_TEMPLATE"
_PR_TEMPLATE_FILE: Final[str] = ".github/pull_request_template.md"
_CONTRIBUTING_FILE: Final[str] = "CONTRIBUTING.md"
_README_FILE: Final[str] = "README.md"
_CHANGELOG_FILE: Final[str] = "CHANGELOG.md"

# URL validation regex (basic)
_GITHUB_URL_PATTERN: Final[re.Pattern] = re.compile(
    r"^https://github\.com/[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+(/.*)?$"
)

# Issue template file names (inside .github/ISSUE_TEMPLATE)
ISSUE_TEMPLATE_NAMES: Final[List[str]] = [
    "bug_report.md",
    "feature_request.md",
    "benchmark.md",
    "docs_request.md",
    "research_design.md",
]

# ---------------------------------------------------------------------------
# Custom exceptions for this module
# ---------------------------------------------------------------------------
class DocumentationError(Exception):
    """Base exception for documentation generation errors."""


class PathTraversalError(DocumentationError):
    """Raised when a file path attempts to escape the allowed output root."""


class InvalidUrlError(DocumentationError):
    """Raised when a provided URL is not valid."""


class FileOperationError(DocumentationError):
    """Raised when a file operation fails."""


# ---------------------------------------------------------------------------
# Validation helpers
# ---------------------------------------------------------------------------
def validate_roadmap_url(url: str) -> str:
    """
    Validate that the roadmap URL is a plausible HTTPS GitHub URL.

    Args:
        url: The URL to validate.

    Returns:
        The validated URL string.

    Raises:
        InvalidUrlError: If the URL does not match the expected pattern or is empty.
    """
    if not url:
        raise InvalidUrlError("Roadmap URL must not be empty.")
    if " " in url or url.count("/") < 3:
        raise InvalidUrlError(f"Roadmap URL appears malformed: {url}")
    if not _GITHUB_URL_PATTERN.match(url):
        log.warning("Roadmap URL does not look like a GitHub URL: %s", url)
    else:
        log.debug("Roadmap URL validated: %s", url)
    return url


def resolve_safe_path(file_path: Path, output_root: Path) -> Path:
    """
    Resolve a file path and verify it is within the allowed output root.

    Args:
        file_path: The desired file path (may be relative or absolute).
        output_root: The root directory under which files must reside.

    Returns:
        Resolved absolute Path that is guaranteed to be under output_root.

    Raises:
        PathTraversalError: If the resolved path escapes the output root.
        FileOperationError: If the resolved path exists but is a directory.
    """
    resolved: Path = file_path.resolve()
    root_resolved: Path = output_root.resolve()
    if root_resolved not in resolved.parents and resolved != root_resolved:
        log.error("Path %s escapes allowed root %s", resolved, root_resolved)
        raise PathTraversalError(f"Path traversal detected: {resolved}")
    if resolved.is_dir():
        raise FileOperationError(f"Expected file path but found directory: {resolved}")
    log.debug("Safe path resolved: %s", resolved)
    return resolved


def validate_output_dir(output_dir: Path) -> Path:
    """
    Validate that the output directory exists and is writeable.

    Args:
        output_dir: Path to the output directory.

    Returns:
        Resolved absolute Path of the output directory.

    Raises:
        FileOperationError: If the directory does not exist or is not writeable.
    """
    resolved: Path = output_dir.resolve()
    if not resolved.is_dir():
        raise FileOperationError(f"Output directory does not exist: {resolved}")
    if not os.access(str(resolved), os.W_OK):
        raise FileOperationError(f"Output directory is not writeable: {resolved}")
    log.debug("Output directory validated: %s", resolved)
    return resolved


# ---------------------------------------------------------------------------
# File writing with safety and error handling
# ---------------------------------------------------------------------------
def write_file(
    file_path: Path,
    content: str,
    output_root: Path,
    overwrite: bool = False,
) -> None:
    """
    Write content to a file, creating parent directories if needed.

    Args:
        file_path: Path to the file to write (relative to output_root or absolute).
        content: Text content to write.
        output_root: The root directory to which file access is restricted.
        overwrite: If True, overwrite existing file; if False, skip with warning.

    Raises:
        PathTraversalError: If the file path is outside the allowed root.
        PermissionError: If the file cannot be written due to permissions.
        OSError: For other filesystem errors.
        ValueError: If any argument is invalid.
    """
    if not isinstance(file_path, Path):
        raise ValueError("file_path must be a Path object.")
    if not isinstance(output_root, Path):
        raise ValueError("output_root must be a Path object.")
    if not isinstance(overwrite, bool):
        raise ValueError("overwrite must be a boolean.")

    if not content:
        log.warning("Empty content for %s – writing anyway.", file_path)

    resolved: Path = resolve_safe_path(file_path, output_root)

    if resolved.exists() and not overwrite:
        log.warning(
            "File %s already exists – skipping (use --overwrite to replace).",
            resolved,
        )
        return

    resolved.parent.mkdir(parents=True, exist_ok=True)

    try:
        resolved.write_text(content, encoding="utf-8")
        log.info("Created/updated %s", resolved)
    except PermissionError as exc:
        log.error("Permission denied writing %s: %s", resolved, exc)
        raise
    except OSError as exc:
        log.error("Failed to write %s: %s", resolved, exc)
        raise


# ---------------------------------------------------------------------------
# Content generation functions (complete and production quality)
# ---------------------------------------------------------------------------
def make_contributing(roadmap_url: str) -> str:
    """
    Generate CONTRIBUTING.md content with roadmap link and instructions.

    Args:
        roadmap_url: URL of the project's public roadmap.

    Returns:
        Markdown-formatted string for CONTRIBUTING.md.
    """
    return f"""# Contributing to [Project Name]

Thank you for your interest in contributing! We welcome contributions from everyone,
including bug fixes, features, documentation improvements, and benchmark updates.

## Local Setup

1. Fork the repository and clone your fork.
2. Install dependencies: `npm install`.
3. Run the development server: `npm run dev`.
4. Verify tests pass: `npm run test:run`.

## Test Commands

- `npm run typecheck` – TypeScript type checking.
- `npm run build` – Build the project.
- `npm run test:run` – Run all tests.

## Pull Request Checklist

Before submitting a PR, please ensure:
- Code follows the project's coding style.
- New functionality includes appropriate tests.
- Documentation is updated where necessary.
- Commits are clean and meaningfully divided.
- PR description links to the relevant issue (if any).

## Non‑goals and Sensitive Information

- **Private corpora / secrets** – Never include private data, API keys, or secrets.
  Keep all contribution materials public.
- **Paid benchmarks** – We do not require contributors to run paid benchmarks.
  Our benchmark suite is free and open.

## Roadmap

Check our public roadmap to see planned features and priorities:
{roadmap_url}

---

*Thank you for helping improve [Project Name]!*
"""


def make_pull_request_template() -> str:
    """
    Generate pull_request_template.md content.

    Returns:
        Markdown-formatted PR template string.
    """
    return """---
name: Pull Request
about: Submit a pull request
title: ''
assignees: ''
---

## Description

Please include a summary of the change and which issue is fixed. Include
relevant motivation and context.

Fixes #(issue)

## Type of change

- [ ] Bug fix
- [ ] New feature
- [ ] Documentation update
- [ ] Benchmark addition/changes
- [ ] Research / design proposal

## Checklist

- [ ] My code follows the style guidelines of this project.
- [ ] I have performed a self-review of my own code.
- [ ] I have commented my code, particularly in hard-to-understand areas.
- [ ] I have made corresponding changes to the documentation.
- [ ] My changes generate no new warnings.
- [ ] I have added tests that prove my fix is effective or that my feature works.
- [ ] New and existing unit tests pass locally with my changes.

## Additional context

Add any other context about the PR here.
"""


