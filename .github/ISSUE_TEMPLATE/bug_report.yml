    - .github/ISSUE_TEMPLATE/docs.yml
    - .github/ISSUE_TEMPLATE/research_design.yml
    - .github/pull_request_template.md  (optional)

Also appends a roadmap link to README.md and adds a note to CHANGELOG.md.
"""

