def _setup_logging(level: int = logging.INFO) -> None:
    """Configure logging for the module.

    Args:
        level: Logging level (default: logging.INFO). Accepts values from
               the logging module constants (e.g., logging.DEBUG).

    Raises:
        ValueError: If level is not a valid logging level.
    """
    if level not in (
        logging.DEBUG,
        logging.INFO,
        logging.WARNING,
        logging.ERROR,
        logging.CRITICAL,
    ):
        raise ValueError(f"Invalid logging level: {level}")

    logging.basicConfig(
        level=level,
        format="%(asctime)s - %(name)s - %(levelname)s - %(message)s",
        datefmt="%Y-%m-%d %H:%M:%S",
    )


def _validate_url(url: str) -> bool:
    """Validate that a string is a non-empty HTTP(S) URL.

    Args:
        url: URL string to validate.

    Returns:
        True if url starts with http:// or https:// and contains at least one
        non-whitespace character after the scheme, False otherwise.

    Raises:
        TypeError: If url is not a string.
    """
    if not isinstance(url, str):
        raise TypeError(f"Expected str, got {type(url).__name__}")

    if not url.strip():
        return False

    if re.match(r"^(https?://\S+).*", url.strip()):
        return True
    return False


def _validate_path_safety(path: Path) -> None:
    """Ensure the path is inside the script's directory to prevent path traversal.

    Args:
        path: Path to validate.

    Raises:
        ValueError: If the path resolves outside of _SCRIPT_DIR.
    """
    try:
        resolved = path.resolve()
        base = _SCRIPT_DIR.resolve()
        if not resolved.parts[: len(base.parts)] == base.parts:
            raise ValueError(f"Path {path} resolves outside the project directory: {base}")
    except (OSError, PermissionError) as exc:
        _LOGGER.error("Could not resolve path '%s': %s", path, exc)
        raise ValueError(f"Unsafe or inaccessible path: {path}") from exc


def _ensure_directory(path: Path) -> Path:
    """Create the parent directory of the given file path if it does not exist.

    Args:
        path: A file Path whose parent should be created.

    Returns:
        The same Path object, unchanged.

    Raises:
        OSError: If directory creation fails.
        PermissionError: If permissions prevent directory creation.
        ValueError: If the path fails safety validation.
    """
    try:
        _validate_path_safety(path)
    except ValueError:
        raise  # re-raise with original message; caller can handle
    try:
        path.parent.mkdir(parents=True, exist_ok=True)
        _LOGGER.debug("Ensured directory: %s", path.parent)
        return path
    except (OSError, PermissionError) as exc:
        _LOGGER.error("Failed to create directory '%s': %s", path.parent, exc)
        raise


def _write_file(filepath: Path, content: str) -> None:
    """Write a string to a file, creating parent directories as needed.

    Args:
        filepath: Path to the file to write (overwrites if exists).
        content: String content to write.

    Raises:
        TypeError: If content is not a string.
        OSError: If file write fails (including PermissionError).
    """
    if not isinstance(content, str):
        raise TypeError(f"Expected str for content, got {type(content).__name__}")
    _ensure_directory(filepath)
    try:
        filepath.write_text(content, encoding="utf-8")
        _LOGGER.info("Wrote file: %s", filepath)
    except OSError as exc:
        _LOGGER.error("Failed to write file '%s': %s", filepath, exc)
        raise


