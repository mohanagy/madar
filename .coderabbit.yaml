# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
reviews:
  auto_review:
    enabled: true
    base_branches:
      - "^main$"
      - "^next$"
  # Explicitly override CodeRabbit's default exclusion so dependency-only PRs are reviewed.
  path_filters:
    - "**/package-lock.json"
